[autoconfigure]
command:/usr/local/opnsense/scripts/OPNsense/PowerDNS/autoconfigure.py
parameters:
type:script_output
message:Generate missing PowerDNS API key and firewall rules

[render]
command:/usr/local/opnsense/scripts/OPNsense/PowerDNS/render_config.py --write
parameters:
type:script_output
message:Render PowerDNS configuration

[checkconfig]
command:/usr/local/sbin/pdns_server --config-dir=/usr/local/etc/pdns --config=check
parameters:
type:script_output
message:Check PowerDNS configuration

[start]
command:/usr/local/etc/rc.d/pdns start
parameters:
type:script_output
message:Start PowerDNS service

[stop]
command:/usr/local/etc/rc.d/pdns stop
parameters:
type:script_output
message:Stop PowerDNS service

[restart]
command:/usr/local/etc/rc.d/pdns restart
parameters:
type:script_output
message:Restart PowerDNS service

[reload]
command:/usr/local/etc/rc.d/pdns reload || /usr/local/etc/rc.d/pdns restart
parameters:
type:script_output
message:Reload PowerDNS service

[status]
command:/usr/local/etc/rc.d/pdns onestatus; exit 0
parameters:
type:script_output
message:PowerDNS service status

[backupdb]
command:/bin/mkdir -p /var/backups/powerdns && /bin/cp -a /var/db/pdns/pdns.sqlite3 /var/backups/powerdns/pdns.sqlite3.$(/bin/date +%Y%m%d-%H%M%S)
parameters:
type:script_output
message:Backup PowerDNS SQLite database

[filterreload]
command:/usr/local/sbin/configctl filter reload
parameters:
type:script_output
message:Reload firewall rules

[zones]
command:/usr/local/opnsense/scripts/OPNsense/PowerDNS/pdns_api.py zones
parameters:
type:script_output
message:List PowerDNS zones

[zone]
command:/usr/local/opnsense/scripts/OPNsense/PowerDNS/pdns_api.py zone
parameters:%s
type:script_output
message:Get PowerDNS zone

[createzone]
command:/usr/local/opnsense/scripts/OPNsense/PowerDNS/pdns_api.py create-zone
parameters:%s %s %s
type:script_output
message:Create PowerDNS zone

[deletezone]
command:/usr/local/opnsense/scripts/OPNsense/PowerDNS/pdns_api.py delete-zone
parameters:%s
type:script_output
message:Delete PowerDNS zone

[upsert]
command:/usr/local/opnsense/scripts/OPNsense/PowerDNS/pdns_api.py upsert
parameters:%s %s %s %s %s
type:script_output
message:Upsert PowerDNS RRset

[delete]
command:/usr/local/opnsense/scripts/OPNsense/PowerDNS/pdns_api.py delete
parameters:%s %s %s
type:script_output
message:Delete PowerDNS RRset
